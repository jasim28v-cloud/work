        .bottom-ad-bar a { color: var(--gold); text-decoration: none; font-weight: bold; display: block; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .btn-link { display: block; background: var(--main-red); color: white; padding: 12px; text-decoration: none; border-radius: 10px; font-weight: bold; }
